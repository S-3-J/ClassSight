<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClassSight</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --border: #dfe4ea;
        --text: #17202a;
        --muted: #667085;
        --accent: #126b5f;
        --danger: #b42318;
        --success: #087443;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      nav {
        display: flex;
        gap: 12px;
        align-items: center;
        max-width: 1080px;
        margin: 0 auto;
        padding: 14px 20px;
      }

      nav strong { margin-right: auto; }
      nav a { color: var(--accent); text-decoration: none; font-weight: 650; }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 20px 48px;
      }

      h1, h2 { margin: 0 0 14px; letter-spacing: 0; }
      h1 { font-size: 28px; }
      h2 { font-size: 18px; }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
      }

      input, button, select {
        width: 100%;
        border-radius: 6px;
        font: inherit;
      }

      input[type="checkbox"] {
        width: auto;
      }

      input {
        border: 1px solid var(--border);
        padding: 10px 12px;
        background: #fff;
        color: var(--text);
      }

      .checkbox-label {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
      }

      .checkbox-label span {
        font-weight: 650;
        color: var(--text);
      }

      select {
        border: 1px solid var(--border);
        padding: 10px 12px;
        background: #fff;
        color: var(--text);
      }

      button {
        border: 0;
        background: var(--accent);
        color: #fff;
        padding: 11px 14px;
        font-weight: 750;
        cursor: pointer;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      th, td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef3f2;
        font-size: 13px;
        color: var(--muted);
      }

      tr:last-child td { border-bottom: 0; }

      .flash {
        margin-bottom: 14px;
        padding: 10px 12px;
        border-radius: 6px;
        background: #eef8f3;
        color: var(--success);
        border: 1px solid #b7e4cc;
      }

      .flash.error {
        background: #fff1f0;
        color: var(--danger);
        border-color: #fecdca;
      }

      .muted { color: var(--muted); }
      .status-present { color: var(--success); font-weight: 750; }
      .status-presence_detected { color: #b54708; font-weight: 750; }
      .status-absent { color: var(--danger); font-weight: 750; }

      .video-wrap {
        position: relative;
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16 / 9;
        background: #101828;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .video-wrap video,
      .video-wrap canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 14px 0;
      }

      .actions button {
        width: auto;
        min-width: 130px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <strong>ClassSight</strong>
        <a href="{{ url_for('index') }}">Overview</a>
        <a href="{{ url_for('enroll') }}">Enroll</a>
        <a href="{{ url_for('attendance') }}">Attendance</a>
        <a href="{{ url_for('live') }}">Live</a>
      </nav>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
